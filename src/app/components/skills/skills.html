<section id="skills" class="skills-section" appReveal>
  <div class="skills-header">
    <h2>
      <span class="kicker">04.</span>
      Stack Tecnológica
    </h2>
    <div class="header-line"></div>
  </div>

  <div class="tech-grid">
    @for (tech of technologies; track tech.name) {
      <div class="tech-card">
        <div class="tech-icon">
          <i [class]="tech.iconClass"></i>
        </div>
        <span class="tech-name">{{ tech.name }}</span>
      </div>
    }
  </div>
</section>
