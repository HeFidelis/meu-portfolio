<section id="projects" class="projects-section" appReveal>
  <div class="projects-header">
    <h2>
      <span class="kicker">03.</span>
      Projetos
    </h2>
    <div class="header-line"></div>
  </div>

  <div class="cards">
    @for (p of projects; track p.title) {
      <div class="card" (click)="open(p)">
        <img [src]="p.image" [alt]="p.title" />
        <h3>{{ p.title }}</h3>
        <p>{{ p.description }}</p>
      </div>
    }
  </div>

  @if (selectedProject) {
    <div class="overlay" (click)="close()">
      <div class="modal" (click)="$event.stopPropagation()">
        <button class="close" (click)="close()">×</button>

        <h3>{{ selectedProject.title }}</h3>
        <p>{{ selectedProject.description }}</p>

        <div class="actions">
          <a [href]="selectedProject.github" target="_blank">GitHub</a>
          <a [href]="selectedProject.demo" target="_blank">Demo</a>
        </div>
      </div>
    </div>
  }
</section>
